{% extends "base.html" %}
{% block title %}Edit Expense{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-12 col-md-8 col-lg-6">
        <div class="card p-4">
            <h4 class="fw-bold mb-3">✏️ Edit Expense</h4>
            <form method="post">
                <div class="mb-3">
                    <label class="form-label fw-semibold">Description</label>
                    <input type="text" name="description" class="form-control" value="{{ expense['description'] }}" required>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold">Store / Shop / Person</label>
                    <select name="shop_id" class="form-select">
                        <option value="">-- None --</option>
                        {% for shop in shops %}
                            <option value="{{ shop.id }}" {% if expense['shop_id'] == shop.id %}selected{% endif %}>{{ shop.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">New Store Name (if not in list)</label>
                    <input type="text" name="new_shop_name" class="form-control" placeholder="e.g. Kirana Store" value="">
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold">Category</label>
                    <select name="category" class="form-select" required>
                        {% for c in categories %}
                            <option value="{{ c }}" {% if expense['category'] == c %}selected{% endif %}>{{ c }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold">Amount (₹)</label>
                    <input type="number" name="amount" step="0.01" min="0.01" class="form-control" value="{{ expense['amount'] }}" required>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-semibold">Date</label>
                    <input type="date" name="entry_date" class="form-control" value="{{ expense['entry_date'] }}" required>
                </div>

                <div class="d-flex gap-2">
                    <a href="{{ url_for('index') }}" class="btn btn-secondary">Cancel</a>
                    <button type="submit" class="btn btn-primary">🔄 Update Expense</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
