{% extends "base.html" %}
{% block title %}Add Expense{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-12 col-md-8 col-lg-6">
        <div class="card p-4">
            <h4 class="fw-bold mb-3">➕ Add a New Expense</h4>
            <form method="post">
                <div class="mb-3">
                    <label class="form-label fw-semibold">Description</label>
                    <input type="text" name="description" class="form-control" placeholder="e.g. Groceries at DMart" value="{{ form.description or '' }}" required>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold">Store / Shop / Person</label>
                    <select name="shop_id" class="form-select">
                        <option value="">-- Select or add new --</option>
                        {% for shop in shops %}
                            <option value="{{ shop.id }}" {% if form.shop_id|string == shop.id|string %}selected{% endif %}>{{ shop.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">New Store Name (if not in list)</label>
                    <input type="text" name="new_shop_name" class="form-control" placeholder="e.g. Kirana Store" value="{{ form.new_shop_name or '' }}">
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold">Category</label>
                    <select name="category" class="form-select" required>
                        <option value="">Select category</option>
                        {% for c in categories %}
                            <option value="{{ c }}" {% if form.category == c %}selected{% endif %}>{{ c }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold">Amount (₹)</label>
                    <input type="number" name="amount" step="0.01" min="0.01" class="form-control" placeholder="0.00" value="{{ form.amount or '' }}" required>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-semibold">Date</label>
                    <input type="date" name="entry_date" class="form-control" value="{{ form.entry_date or today }}" required>
                </div>

                <div class="d-flex gap-2">
                    <a href="{{ url_for('index') }}" class="btn btn-secondary">Cancel</a>
                    <button type="submit" class="btn btn-primary">💾 Save Expense</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
